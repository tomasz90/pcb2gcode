name: CI

on:
  pull_request:
  push:
    branches:
      - master
  schedule:
    - cron: '5 4 * * 1'
  workflow_dispatch:
    inputs:
      debug_enabled:
        type: boolean
        description: 'Run the build with tmate debugging enabled (https://github.com/marketplace/actions/debugging-with-tmate)'
        required: false
        default: false
      no_restore_cache:
        type: boolean
        description: 'Do not restore cache'
        required: false
        default: false
      no_restore_ccache:
        type: boolean
        description: 'Do not restore ccache'
        required: false
        default: false
      allow_ci_cache_despite_ci_changes:
        type: boolean
        description: 'Restore cache even when .github/workflows/ci.yml has changed (e.g. to speed up CI while iterating on workflow)'
        required: false
        default: false

jobs:
  build-and-test:
    name: ${{ matrix.os }}_${{ matrix.boost }}_${{ matrix.compiler }}_${{ matrix.geos }}
    strategy:
      matrix:
        os: [ubuntu, windows]
        boost: ['latest', '1_83']
        geos: ['3.13.1', 'none']
        compiler: ['g++'] # TODO: Put clang++ back again.
        exclude:
          - os: windows
            boost: '1_83' # TODO: Build with boost 1.83 on Windows.
        include:
          - geos: '3.13.1'
            os: ubuntu
            code_coverage: "-DPCB2GCODE_ENABLE_CODE_COVERAGE=ON" # TODO: Add code coverage for Windows.
          - os: ubuntu
            shell: '/usr/bin/bash -l -e -o pipefail {0}'
            local_install_path: '$HOME/.local'
            ccache_path: '$HOME/.ccache'
          - os: windows
            shell: msys2 {0}
            local_install_path: '/d/a/pcb2gcode/.local'
            ccache_path: '/d/a/pcb2gcode/.ccache'
    runs-on: ${{ matrix.os }}-latest
    defaults:
      run:
        shell: ${{ matrix.shell }}
    steps:
    - name: Setup msys2
      if: matrix.os == 'windows'
      uses: msys2/setup-msys2@v2
      with:
        msystem: UCRT64
        update: true
        pacboy: >-
          base-devel:
          bash:
          gettext-devel:
          git
          libtool
          boost
          cairo
          cmake
          pkgconf
          gcc
          gtk2
          gtkmm
          ccache
          gdk-pixbuf2
          imagemagick
          lcov
          zip:
    - name: Checkout pcb2gcode source
      uses: actions/checkout@v3
    - name: Check for ci workflow changes
      id: ci-changed
      uses: dorny/paths-filter@v3
      with:
        filters: |
          ci: '.github/workflows/ci.yml'
    - name: Check for allow CI cache label
      id: allow-ci-cache-label
      run: |
        allowed=false
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          labels="|${{ join(github.event.pull_request.labels.*.name, '|') }}|"
          if [[ "$labels" == *"|use-ci-cache|"* ]]; then allowed=true; fi
        fi
        echo "allowed=$allowed" >> $GITHUB_OUTPUT
    - name: Setup paths and env
      run: |
        mkdir -p ${{ matrix.local_install_path }}/bin
        mkdir -p ${{ matrix.local_install_path }}/lib/pkgconfig
        rm -f ~/.bash_profile
        echo "export PKG_CONFIG_PATH='${{ matrix.local_install_path }}/lib/pkgconfig:$PKG_CONFIG_PATH'" >> ~/.bash_profile
        echo "export LD_LIBRARY_PATH='${{ matrix.local_install_path }}/lib:$LD_LIBRARY_PATH'" >> ~/.bash_profile
        echo "export PATH='${{ matrix.local_install_path }}/bin:$PATH'" >> ~/.bash_profile
        echo "export LOCAL_INSTALL_PATH='${{ matrix.local_install_path }}'" >> ~/.bash_profile
        echo $GITHUB_JSON
        echo "export NUM_CPUS='$((`nproc --all` * 4))'" >> ~/.bash_profile
        echo "export CMAKE_C_COMPILER_LAUNCHER=`which ccache`" >> ~/.bash_profile
        echo "export CMAKE_CXX_COMPILER_LAUNCHER=`which ccache`" >> ~/.bash_profile
        echo "export CMAKE_C_COMPILER=`which gcc`" >> ~/.bash_profile
        echo "export CMAKE_CXX_COMPILER=`which g++`" >> ~/.bash_profile
      env:
        GITHUB_JSON: ${{ toJSON(github) }}
    - name: Windows specific setup
      if: matrix.os == 'windows'
      run: |
        lcov --version
    - name: Ubuntu specific setup
      if: matrix.os == 'ubuntu'
      run: |
        sudo apt-get update
        sudo apt-get install libgtkmm-2.4-dev moreutils autopoint libc6-dbg librsvg2-dev parallel ccache g++
        sudo apt-get install libperlio-gzip-perl libjson-perl libcapture-tiny-perl libjson-xs-perl libdatetime-perl python3-setuptools
        pip3 install --user wheel colour_runner unittest2 termcolor concurrencytest in_place

### Install boost from apt-get
    - name: Ubuntu boost
      if: matrix.boost == 'latest' && matrix.os == 'ubuntu'
      run:
        sudo apt-get install -y libboost-program-options-dev libboost-test-dev


    - name: Display information about build environment
      run: |
        pwd
        cat ~/.bash_profile
        env
        if command -v g++; then g++ --version; fi
        if command -v clang++; then clang++ --version; fi
        if command -v pkg-config; then pkg-config --version; fi
        if command -v m4; then m4 --version; fi
    - name: Sanitize cache key
      id: sanitize-key
      run: |
        echo "key=$(echo '${{ matrix.os }}_${{ matrix.boost }}_${{ matrix.compiler }}_${{ matrix.geos }}' | sed 's/+/plus/g')" >> $GITHUB_OUTPUT
        if command -v cygpath; then
          echo "path=$(cygpath -w ${{ matrix.local_install_path }})" >> $GITHUB_OUTPUT
          echo "ccache_path=$(cygpath -w ${{ matrix.ccache_path }})" >> $GITHUB_OUTPUT
        else
          echo "path=${{ matrix.local_install_path }}" >> $GITHUB_OUTPUT
          echo "ccache_path=${{ matrix.ccache_path }}" >> $GITHUB_OUTPUT
        fi

    - name: Restore cache
      uses: actions/cache/restore@v5
      if: ${{ inputs.no_restore_cache != true && (steps.ci-changed.outputs.ci != 'true' || steps.allow-ci-cache-label.outputs.allowed == 'true' || inputs.allow_ci_cache_despite_ci_changes == true) }}
      with:
        path: ${{ steps.sanitize-key.outputs.path }}
        key: ${{ steps.sanitize-key.outputs.key }}-${{ github.run_id }}-${{ github.run_attempt }}
        restore-keys: |
          ${{ steps.sanitize-key.outputs.key }}-
    - name: Default don't update cache
      run: echo "UPDATE_CACHE=false" >> $GITHUB_ENV

### Setup ccache
    - name: Restore ccache
      uses: actions/cache/restore@v5
      if: ${{ inputs.no_restore_ccache != true }}
      with:
        path: ${{ steps.sanitize-key.outputs.ccache_path }}
        key: ccache-${{ steps.sanitize-key.outputs.key }}-${{ github.run_id }}-${{ github.run_attempt }}
        restore-keys: |
          ccache-${{ steps.sanitize-key.outputs.key }}-
    - name: ccache config
      run: |
        ccache --version
        ccache --show-config
        ccache --set-config=cache_dir=${{ matrix.ccache_path }}
        ccache -p
        ccache -z

### Install boost from sources
    - name: Build and install boost
      if: matrix.boost != 'latest'
      env:
        BOOST: ${{ matrix.boost }}_0
      run: |
        BOOST_VERSION="${{ matrix.boost }}"
        BOOST_VERSION="${BOOST_VERSION//_/.}"
        if [ ! -d "${LOCAL_INSTALL_PATH}/lib/cmake/Boost-${BOOST_VERSION}.0" ]; then
          echo "UPDATE_CACHE=true" >> $GITHUB_ENV
          pushd ~
          for i in {1..5}; do
            wget -q -T20 -t1 -O "boost_${BOOST}.tar.bz2" "https://github.com/pcb2gcode/pcb2gcode/releases/download/v2.0.0/boost_${BOOST}.tar.bz2" && break;
          done
          tar xjf "boost_${BOOST}.tar.bz2"
          pushd boost_${BOOST}
          ./bootstrap.sh --with-libraries=program_options,test --prefix=${LOCAL_INSTALL_PATH}
          ./b2 -j ${NUM_CPUS}
          ./b2 install
          popd
          popd
        fi

### GEOS setup
    - name: Build and install geos ${{ matrix.geos }}
      if: matrix.geos != 'none'
      run: |
        if [[ ! -d "${LOCAL_INSTALL_PATH}/include/geos" ]]; then
          echo "UPDATE_CACHE=true" >> $GITHUB_ENV
          pushd ~
          git clone --depth 1 --branch ${{ matrix.geos }} https://github.com/libgeos/geos.git
          pushd geos
          echo "GEOS commit: $(git rev-parse HEAD)"
          mkdir build
          pushd build
          cmake -G "Unix Makefiles" -DCMAKE_BUILD_TYPE=Release .. -DCMAKE_INSTALL_PREFIX=${LOCAL_INSTALL_PATH} 
          make -j ${NUM_CPUS}
          make install
          popd
          popd
          popd
        fi
        geos-config --version

### Coverage setup
    - name: coverage specific setup
      if: matrix.code_coverage != '' && matrix.os == 'ubuntu'
      run: |
        pushd ~
        git clone --branch=v2.4 --depth=1 https://github.com/linux-test-project/lcov.git
        pushd lcov
        echo "LCOV commit: $(git rev-parse HEAD)"
        make PREFIX=${LOCAL_INSTALL_PATH} install
        hash -r
        lcov --version
        popd
        popd

    - name: Setup tmate session
      uses: mxschmitt/action-tmate@v3
      if: ${{ github.event_name == 'workflow_dispatch' && inputs.debug_enabled }}

### Gerbv setup
    - name: Install gerbv  # TODO: Use gerbv instead of eyal0 repo.
      run: |
        if ! gerbv --version; then
          echo "UPDATE_CACHE=true" >> $GITHUB_ENV
          pushd ~
          git clone --depth=1 --branch=iwyu https://github.com/eyal0/gerbv.git
          pushd gerbv
          echo "GERBV commit: $(git rev-parse HEAD)"
          mkdir build
          pushd build
          cmake -G "Unix Makefiles" -DCMAKE_BUILD_TYPE=Release .. -DCMAKE_INSTALL_PREFIX=${LOCAL_INSTALL_PATH}
          make -j 20
          make install
          popd
          popd
          popd
        fi
        hash -r
        gerbv --version

### Valgrind setup
    - name: Install valgrind
      if: matrix.os == 'ubuntu'
      run: |
        if ! valgrind --version || ! grep -qx "$(git ls-remote git://sourceware.org/git/valgrind.git master)" ${LOCAL_INSTALL_PATH}/bin/valgrind.version; then
          git ls-remote git://sourceware.org/git/valgrind.git master > ${LOCAL_INSTALL_PATH}/bin/valgrind.version
          echo "UPDATE_CACHE=true" >> $GITHUB_ENV
          pushd ~
          git clone --depth=1 --branch=master git://sourceware.org/git/valgrind.git
          echo "VALGRIND commit: $(git rev-parse HEAD)"
          pushd valgrind
          sh autogen.sh
          ./configure --prefix=${LOCAL_INSTALL_PATH}
          make -j ${NUM_CPUS}
          make install
          popd
          popd
        fi
        valgrind --version
    - name: Finalize setup
      run: |
        hash -r

### Configure pcb2gcode (CMake)
    - name: >
        Configure pcb2gcode (CMake)
        ${{ matrix.code_coverage == '' && 'without code coverage' || 'with code coverage' }}
      run: |
        CMAKE_ARGS=()
        if [[ -n "${{ matrix.code_coverage }}" ]]; then
          CMAKE_ARGS+=("${{ matrix.code_coverage }}")
        fi
        if [[ "${{ matrix.boost }}" != "latest" ]]; then
          BOOST_VERSION="${{ matrix.boost }}"
          BOOST_VERSION="${BOOST_VERSION//_/.}"
          CMAKE_ARGS+=("-DBoost_DIR=${LOCAL_INSTALL_PATH}/lib/cmake/Boost-${BOOST_VERSION}.0")
        fi
        VERBOSE=1 cmake -S . -B build "${CMAKE_ARGS[@]}"

### Build pcb2gcode
    - name: Build pcb2gcode
      run: |
        cmake --build build -j ${NUM_CPUS}
    - name: Display pcb2gcode version
      run: |
        ./build/pcb2gcode --version
        GIT_COMMIT=$(git log -1 --format='%h')
        PCB2GCODE_VERSION=$(./build/pcb2gcode --version | head -1)-g${GIT_COMMIT}
        echo "PCB2GCODE_VERSION=$PCB2GCODE_VERSION" >> $GITHUB_ENV

### Run examples
    - name: Run examples with valgrind
      if: github.event_name == 'schedule' && ((matrix.code_coverage == '') && matrix.os == 'ubuntu')
      run: |
        pushd tests/data/gerbv_example
        ls | parallel -k -j ${NUM_CPUS} --halt soon,fail=1 '
          { echo "::group::Running on {}";
            pushd {};
            if [[ -f "no-valgrind" ]]; then
              cat no-valgrind;
            fi;
            if [[ -f "no-valgrind" || "${{ matrix.os }}" != "ubuntu" ]]; then
              time ../../../build/pcb2gcode || exit;
            else
              time valgrind --error-exitcode=127 --errors-for-leak-kinds=definite --leak-check=full -s --exit-on-first-error=yes --expensive-definedness-checks=yes -- ../../../build/pcb2gcode || exit;
            fi;
            popd;
            echo "::endgroup::";
          } 2>&1'
        popd
    - name: Run examples without valgrind
      if: github.event_name == 'schedule' && !((matrix.code_coverage == '') && matrix.os == 'ubuntu')
      run: |
        for d in tests/data/gerbv_example/*; do
            if [ -d "$d" ]; then
                pushd "$d"
                time ../../../build/pcb2gcode || exit $?
                popd
            fi
        done
    - name: >
        Run unit tests 
        ${{ matrix.code_coverage == '' && matrix.os == 'ubuntu' && 'with valgrind' || 'without valgrind' }} and
        ${{ (matrix.boost != '1_83' || matrix.geos != '3.13.1') && 'without integration tests' || 'with integration tests' }}
      env:
        VERBOSE: 1
      run: |
        CTEST_ARGS=(--test-dir build --output-on-failure -j ${NUM_CPUS})
        if [[ "${{ matrix.code_coverage }}" == "" && "${{ matrix.os }}" == "ubuntu" ]]; then
          export CTEST_MEMORYCHECK_COMMAND=valgrind
          CTEST_ARGS+=(-T memcheck)
        fi
        if [[ "${{ matrix.boost }}" != "1_83" || "${{ matrix.geos }}" != "3.13.1" ]]; then
          CTEST_ARGS+=(-E '^(integration_tests)$')
        fi
        ctest "${CTEST_ARGS[@]}"

### Gather coverage
    - name: Gather coverage
      if: matrix.code_coverage != ''
      run: |
        cmake --build build --target pcb2gcode-lcov -j ${NUM_CPUS}
    - name: Upload coverage artifact
      if: matrix.code_coverage != ''
      uses: actions/upload-artifact@v4
      with:
        name: lcov-${{ steps.sanitize-key.outputs.key }}
        path: build/pcb2gcode-lcov.info
    - name: Prepare build for upload for Ubuntu
      if: matrix.os != 'windows'
      run: |
        mkdir -p pcb2gcode-${PCB2GCODE_VERSION}/.libs
        cp ./build/pcb2gcode pcb2gcode-${PCB2GCODE_VERSION}/
        if [[ -e ${LOCAL_INSTALL_PATH}/lib/libgerbv.so.1 ]]; then
          cp -L ${LOCAL_INSTALL_PATH}/lib/libgerbv.so.1 pcb2gcode-${PCB2GCODE_VERSION}/.libs;
        fi
        if [[ -f ${LOCAL_INSTALL_PATH}/lib/libgeos.so.* ]]; then
          cp -L ${LOCAL_INSTALL_PATH}/lib/libgeos.so.* pcb2gcode-${PCB2GCODE_VERSION}/.libs;
        fi

        cat > pcb2gcode-${PCB2GCODE_VERSION}/pcb2gcode.sh << EOF
        #!/bin/bash

        if [[ \$EUID > 0 ]]; then MAYBE_SUDO=sudo; fi

        export DEBIAN_FRONTEND=noninteractive
        \$MAYBE_SUDO apt-get update -y
        \$MAYBE_SUDO apt-get install -y libglib2.0-bin
        \$MAYBE_SUDO apt-get install -y libgtkmm-2.4-1v5
        LD_LIBRARY_PATH=\$PWD/.libs:\$LD_LIBRARY_PATH ./pcb2gcode "\$@"
        EOF

        chmod a+x pcb2gcode-${PCB2GCODE_VERSION}/pcb2gcode.sh
        tar czvf pcb2gcode-${{ steps.sanitize-key.outputs.key }}-${PCB2GCODE_VERSION}.tar.gz pcb2gcode-${PCB2GCODE_VERSION}
      env:
        GEOS: ${{ matrix.geos }}
    # TODO: Fix upload for windows
    - name: Prepare build for upload for Windows
      if: matrix.os == 'windows' && false
      run: |
        mkdir pcb2gcode-${PCB2GCODE_VERSION}
        pushd pcb2gcode-${PCB2GCODE_VERSION}
        cp ../build/pcb2gcode.exe .
        cp ${LOCAL_INSTALL_PATH}/lib/libgerbv.a .
        if [[ ${GEOS} != 'none' && ${GEOS} != 'latest' ]]; then
          cp ${LOCAL_INSTALL_PATH}/bin/libgeos*.dll .
        fi
        if [[ ${GEOS} == 'latest' ]]; then
          cp /ucrt64/bin/libgeos*.dll .
        fi
        cp /ucrt64/bin/libLerc.dll .
        cp /ucrt64/bin/libboost_program_options-mt.dll .
        cp /ucrt64/bin/libbrotlicommon.dll .
        cp /ucrt64/bin/libbrotlidec.dll .
        cp /ucrt64/bin/libbz2-1.dll .
        cp /ucrt64/bin/libcairo-2.dll .
        cp /ucrt64/bin/libdatrie-1.dll .
        cp /ucrt64/bin/libdeflate.dll .
        cp /ucrt64/bin/libexpat-1.dll .
        cp /ucrt64/bin/libffi-8.dll .
        cp /ucrt64/bin/libfontconfig-1.dll .
        cp /ucrt64/bin/libfreetype-6.dll .
        cp /ucrt64/bin/libfribidi-0.dll .
        cp /ucrt64/bin/libgcc_s_seh-1.dll .
        cp /ucrt64/bin/libgdk-win32-2.0-0.dll .
        cp /ucrt64/bin/libgdk_pixbuf-2.0-0.dll .
        cp /ucrt64/bin/libgio-2.0-0.dll .
        cp /ucrt64/bin/libglib-2.0-0.dll .
        cp /ucrt64/bin/libgmodule-2.0-0.dll .
        cp /ucrt64/bin/libgobject-2.0-0.dll .
        cp /ucrt64/bin/libgraphite2.dll .
        cp /ucrt64/bin/libharfbuzz-0.dll .
        cp /ucrt64/bin/libiconv-2.dll .
        cp /ucrt64/bin/libintl-8.dll .
        cp /ucrt64/bin/libjbig-0.dll .
        cp /ucrt64/bin/libjpeg-8.dll .
        cp /ucrt64/bin/liblzma-5.dll .
        cp /ucrt64/bin/libpango-1.0-0.dll .
        cp /ucrt64/bin/libpangocairo-1.0-0.dll .
        cp /ucrt64/bin/libpangoft2-1.0-0.dll .
        cp /ucrt64/bin/libpangowin32-1.0-0.dll .
        cp /ucrt64/bin/libpcre2-8-0.dll .
        cp /ucrt64/bin/libpixman-1-0.dll .
        cp /ucrt64/bin/libpng16-16.dll .
        cp /ucrt64/bin/libsharpyuv-0.dll .
        cp /ucrt64/bin/libstdc++-6.dll .
        cp /ucrt64/bin/libthai-0.dll .
        cp /ucrt64/bin/libtiff-6.dll .
        cp /ucrt64/bin/libwebp-7.dll .
        cp /ucrt64/bin/libwinpthread-1.dll .
        cp /ucrt64/bin/libzstd.dll .
        cp /ucrt64/bin/zlib1.dll .
        popd
        zip -r pcb2gcode-${{ steps.sanitize-key.outputs.key }}-${PCB2GCODE_VERSION}.zip pcb2gcode-${PCB2GCODE_VERSION}
      env:
        GEOS: ${{ matrix.geos }}
    - name: Upload build for Ubuntu
      if: matrix.os != 'windows'
      uses: actions/upload-artifact@v4
      with:
        name: pcb2gcode-${{ steps.sanitize-key.outputs.key }}-${{ env.PCB2GCODE_VERSION }}
        path: pcb2gcode-${{ steps.sanitize-key.outputs.key }}-${{ env.PCB2GCODE_VERSION }}.tar.gz
        compression-level: 0
    - name: Upload build for Windows # TODO: Fix upload for windows
      if: matrix.os == 'windows' && false
      uses: actions/upload-artifact@v4
      with:
        name: pcb2gcode-${{ steps.sanitize-key.outputs.key }}-${{ env.PCB2GCODE_VERSION }}
        path: pcb2gcode-${{ steps.sanitize-key.outputs.key }}-${{ env.PCB2GCODE_VERSION }}.zip
        compression-level: 0
    - name: Upload coverage to coveralls
      if: matrix.code_coverage != ''
      uses: eyal0/github-action@master
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        path-to-lcov: build/pcb2gcode-lcov.info
        flag-name: ci-${{ steps.sanitize-key.outputs.key }}
        parallel: true
    - name: Save version number
      run: echo "${PCB2GCODE_VERSION}" > version.txt
    - name: Upload version artifact
      if: matrix.code_coverage != ''
      uses: actions/upload-artifact@v4
      with:
        name: version-${{ steps.sanitize-key.outputs.key }}.txt
        path: version.txt
    - name: Save cache
      uses: actions/cache/save@v5
      if: env.UPDATE_CACHE == 'true'
      with:
        path: ${{ steps.sanitize-key.outputs.path }}
        key: ${{ steps.sanitize-key.outputs.key }}-${{ github.run_id }}-${{ github.run_attempt }}
    - name: Save ccache
      uses: actions/cache/save@v5
      with:
        path: ${{ steps.sanitize-key.outputs.ccache_path }}
        key: ccache-${{ steps.sanitize-key.outputs.key }}-${{ github.run_id }}-${{ github.run_attempt }}
    - name: ccache stats
      run: |
        ccache -s

  finalize-coverage:
    needs: [build-and-test]
    name: Finalize coverage
    runs-on: ubuntu-latest
    steps:
    - name: Finalize coverage
      uses: eyal0/github-action@master
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        parallel-finished: true
  release:
    if: github.event_name == 'push'
    needs: [build-and-test]
    name: Draft Release
    runs-on: ubuntu-latest
    permissions:
      # write permission is required to create a github release
      contents: write
      # write permission is required for autolabeler
      # otherwise, read permission is required at least
      pull-requests: write
    steps:
      - name: Download the artifacts to release
        id: download-artifacts
        uses: actions/download-artifact@v4
      - run: echo "PCB2GCODE_VERSION=$(cat version/version.txt)" >> $GITHUB_ENV
      - name: Draft release
        id: release_drafter
        uses: release-drafter/release-drafter@v6
        # (Optional) specify config name to use, relative to .github/. Default: release-drafter.yml
        # with:
        #   config-name: my-config.yml
        #   disable-autolabeler: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Delete existing release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_ID="${{ steps.release_drafter.outputs.id }}"
          ASSETS=$(curl -sS -H "Authorization: Bearer $GITHUB_TOKEN" "https://api.github.com/repos/${{ github.repository }}/releases/${RELEASE_ID}/assets")
          echo "$ASSETS" | jq -r '.[].id' | while read -r asset_id; do
            [ -n "$asset_id" ] || continue
            echo "Deleting asset id $asset_id..."
            curl -sS -X DELETE -H "Authorization: Bearer $GITHUB_TOKEN" "https://api.github.com/repos/${{ github.repository }}/releases/assets/$asset_id"
          done
      - name: Upload release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          UPLOAD_URL="${{ steps.release_drafter.outputs.upload_url }}"
          UPLOAD_URL="${UPLOAD_URL%\{*}"
          DP="${{ steps.download-artifacts.outputs.download-path }}"
          find $DP
          for f in "$DP"/pcb2gcode-*/*.tar.gz "$DP"/pcb2gcode-*/*.zip; do
            [ -f "$f" ] || continue
            name=$(basename "$f")
            echo "Uploading $name..."
            curl -sS -X POST \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Content-Type: $([ "${f%.zip}" != "$f" ] && echo "application/zip" || echo "application/gzip")" \
              --data-binary @"$f" \
              "$UPLOAD_URL?name=$name"
          done
